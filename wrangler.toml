name = "your-first-customer"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "95728620a8d5dfde119e0889cc3864e9"
pages_build_output_dir = "./dist"

[[durable_objects.bindings]]
name = "FOUNDER_SESSION"
class_name = "FounderSession"

[[migrations]]
tag = "v1"
new_classes = ["FounderSession"]

[[d1_databases]]
binding = "DB"
database_name = "yfc-db"
database_id = "REPLACE_AFTER_RUNNING_wrangler_d1_create_yfc-db"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_AFTER_RUNNING_wrangler_kv_namespace_create_yfc-cache"

[vars]
CLAUDE_MODEL = "claude-sonnet-4-6"

# Secrets (set via: wrangler secret put SECRET_NAME)
# ANTHROPIC_API_KEY
# APOLLO_API_KEY
# TOFLOW_API_KEY
